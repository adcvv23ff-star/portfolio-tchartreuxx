<!--
  ════════════════════════════════════════════════════════════════
  WIDGET "LUCIA" — Trợ lý học thuật Portfolio
  ════════════════════════════════════════════════════════════════
  CÁCH DÙNG:
  1. Dán TOÀN BỘ khối này vào ngay trước thẻ </body> của bất kỳ
     trang nào trong portfolio (index.html, bai-1.html ... bai-6.html,
     du-an.html, tong-ket.html). Các trang này đã sẵn có:
       - Biến CSS theme (--color-paper, --color-surface, --color-ink...)
       - Font Space Grotesk / Inter / Bricolage Grotesque
       - Symbol SVG #mascot (dùng làm avatar chatbot)
     nên widget sẽ tự động đồng bộ Dark/Light mode với trang.
  2. Tìm dòng "ĐIỂM TÍCH HỢP BACKEND THẬT" bên dưới và thay bằng
     lệnh gọi API thực tế tới Coze / Dify / Gemini / Claude.
     Hiện tại phần trả lời đang chạy ở chế độ DEMO (giả lập bằng
     JS, khớp từ khoá) chỉ để xem trước giao diện — CHƯA có AI thật.
  ════════════════════════════════════════════════════════════════
-->
<style>
  .chat-fab { position: fixed; bottom: 1.5rem; left: 1.5rem; z-index: 95; width: 3.5rem; height: 3.5rem; border-radius: 9999px; background: linear-gradient(135deg, #7C3AED, #EC4899); display: flex; align-items: center; justify-content: center; border: 3px solid rgba(15,11,29,0.85); box-shadow: 5px 5px 0 rgba(15,11,29,0.85); transition: transform .25s ease; }
  html.light .chat-fab { box-shadow: 5px 5px 0 rgba(30,27,46,0.85); }
  .chat-fab:hover { transform: translateY(-3px) scale(1.05) rotate(-4deg); }
  .chat-fab svg { width: 1.9rem; height: 1.9rem; }
  .chat-fab-pulse { position: absolute; inset: -4px; border-radius: 9999px; border: 2px solid #EC4899; opacity: .6; animation: chatPulse 2.4s ease-out infinite; pointer-events: none; }
  @keyframes chatPulse { 0% { transform: scale(1); opacity: .6; } 100% { transform: scale(1.35); opacity: 0; } }
  .chat-fab-badge { position: absolute; top: -4px; right: -4px; width: 1.15rem; height: 1.15rem; border-radius: 9999px; background: #FB923C; border: 2px solid rgb(var(--color-paper)); font-size: .6rem; font-weight: 800; color: #1E1B2E; display: flex; align-items: center; justify-content: center; font-family: 'Space Grotesk', sans-serif; }

  .chat-panel { position: fixed; bottom: 5.5rem; left: 1.5rem; z-index: 96; width: min(23rem, calc(100vw - 2rem)); height: min(34rem, calc(100vh - 8rem)); background: rgb(var(--color-surface)); border-radius: 1.75rem; border: 3px solid rgba(15,11,29,0.85); box-shadow: 8px 8px 0 rgba(15,11,29,0.85); display: flex; flex-direction: column; overflow: hidden; opacity: 0; transform: translateY(16px) scale(.96); pointer-events: none; transition: opacity .25s ease, transform .25s ease; }
  html.light .chat-panel { box-shadow: 8px 8px 0 rgba(30,27,46,0.85); border-color: rgba(30,27,46,0.85); }
  .chat-panel.open { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }

  .chat-header { background: linear-gradient(120deg, #7C3AED, #EC4899, #FB923C); padding: .9rem 1rem; display: flex; align-items: center; gap: .7rem; flex-shrink: 0; }
  .chat-header .avatar { width: 2.5rem; height: 2.5rem; border-radius: 9999px; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .chat-header .avatar svg { width: 1.7rem; height: 1.7rem; }
  .chat-header .titles { flex: 1; min-width: 0; }
  .chat-header .titles p:first-child { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: .85rem; color: #fff; }
  .chat-header .titles p:last-child { font-size: .68rem; color: rgba(255,255,255,0.85); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chat-header .status-dot { width: .4rem; height: .4rem; border-radius: 9999px; background: #4ADE80; display: inline-block; margin-right: .3rem; box-shadow: 0 0 0 2px rgba(74,222,128,0.3); }
  .chat-close { width: 2rem; height: 2rem; border-radius: 9999px; background: rgba(255,255,255,0.15); color: #fff; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background .2s ease; }
  .chat-close:hover { background: rgba(255,255,255,0.3); }

  .chat-body { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: .6rem; background-image: radial-gradient(rgb(var(--color-ink) / var(--dot-op, 0.05)) 1px, transparent 1px); background-size: 20px 20px; }
  .chat-bubble { max-width: 85%; padding: .55rem .8rem; border-radius: 1rem; font-size: .8rem; line-height: 1.5; font-family: 'Inter', sans-serif; }
  .chat-bubble.bot { align-self: flex-start; background: rgb(var(--color-paper)); border: 1px solid rgb(var(--color-ink) / 0.1); color: rgb(var(--color-ink) / 0.9); border-bottom-left-radius: .3rem; }
  .chat-bubble.user { align-self: flex-end; background: linear-gradient(135deg, #7C3AED, #EC4899); color: #fff; border-bottom-right-radius: .3rem; }
  .chat-bubble.typing { display: flex; gap: .25rem; align-items: center; padding: .7rem .9rem; }
  .chat-bubble.typing span { width: .35rem; height: .35rem; border-radius: 9999px; background: rgb(var(--color-ink) / 0.4); animation: typingDot 1.2s ease-in-out infinite; }
  .chat-bubble.typing span:nth-child(2) { animation-delay: .2s; }
  .chat-bubble.typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes typingDot { 0%, 60%, 100% { transform: translateY(0); opacity: .4; } 30% { transform: translateY(-4px); opacity: 1; } }

  .chat-quick { display: flex; flex-wrap: wrap; gap: .4rem; padding: 0 1rem .75rem; flex-shrink: 0; }
  .chat-quick button { font-size: .68rem; font-family: 'Space Grotesk', sans-serif; font-weight: 600; padding: .35rem .7rem; border-radius: 9999px; background: rgb(var(--color-ink) / 0.06); border: 1px solid rgb(var(--color-ink) / 0.12); color: rgb(var(--color-ink) / 0.75); transition: background .2s ease, color .2s ease; }
  .chat-quick button:hover { background: rgb(124 58 237 / 0.15); color: #7C3AED; }

  .chat-input-row { display: flex; gap: .5rem; padding: .75rem; border-top: 1px solid rgb(var(--color-ink) / 0.1); flex-shrink: 0; }
  .chat-input-row input { flex: 1; min-width: 0; background: rgb(var(--color-paper)); border: 1px solid rgb(var(--color-ink) / 0.15); border-radius: 9999px; padding: .55rem 1rem; font-size: .8rem; color: rgb(var(--color-ink)); font-family: 'Inter', sans-serif; }
  .chat-input-row input:focus { outline: none; border-color: #EC4899; }
  .chat-send-btn { width: 2.5rem; height: 2.5rem; flex-shrink: 0; border-radius: 9999px; background: linear-gradient(135deg, #7C3AED, #EC4899); color: #fff; display: flex; align-items: center; justify-content: center; transition: transform .2s ease; }
  .chat-send-btn:hover { transform: scale(1.08); }
  .chat-disclaimer { font-size: .6rem; text-align: center; color: rgb(var(--color-ink) / 0.35); padding-bottom: .6rem; font-family: 'Inter', sans-serif; }

  @media (max-width: 480px) {
    .chat-panel { left: .75rem; bottom: 5rem; width: calc(100vw - 1.5rem); }
    .chat-fab { left: 1rem; bottom: 1.25rem; }
  }
</style>

<!-- Nút nổi mở chatbot -->
<button id="chatFab" class="chat-fab" aria-label="Mở trợ lý học thuật Portfolio">
  <span class="chat-fab-pulse" aria-hidden="true"></span>
  <span class="chat-fab-badge">AI</span>
  <svg viewBox="0 0 100 100" fill="none">
    <use href="#mascot"></use>
  </svg>
</button>

<!-- Khung chat -->
<div id="chatPanel" class="chat-panel">
  <div class="chat-header">
    <div class="avatar"><svg viewBox="0 0 100 100"><use href="#mascot"></use></svg></div>
    <div class="titles">
      <p><span class="status-dot"></span>Lucia</p>
      <p>Trợ lý học thuật · Portfolio Nguyễn Bảo Trung</p>
    </div>
    <button id="chatClose" class="chat-close" aria-label="Đóng">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
  </div>

  <div id="chatBody" class="chat-body">
    <div class="chat-bubble bot">Dạ thưa Thầy/Cô, em là Lucia — trợ lý học thuật hỗ trợ tra cứu nội dung Portfolio của sinh viên Nguyễn Bảo Trung ạ. Thầy/Cô có thể hỏi em về bất kỳ nội dung nào trong 6 bài thực hành ạ.</div>
  </div>

  <div id="chatQuick" class="chat-quick">
    <button type="button">Giới thiệu về sinh viên</button>
    <button type="button">Bài 2 dùng bao nhiêu nguồn?</button>
    <button type="button">Nguyên tắc dùng AI ở Bài 6</button>
  </div>

  <form id="chatForm" class="chat-input-row">
    <input id="chatInput" type="text" placeholder="Nhập câu hỏi cho trợ lý..." autocomplete="off">
    <button type="submit" class="chat-send-btn" aria-label="Gửi">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 19V5m0 0l-6 6m6-6l6 6"/></svg>
    </button>
  </form>
  <p class="chat-disclaimer">Bản demo giao diện — chưa kết nối AI thật</p>
</div>

<script>
(() => {
  const fab = document.getElementById('chatFab');
  const panel = document.getElementById('chatPanel');
  const closeBtn = document.getElementById('chatClose');
  const body = document.getElementById('chatBody');
  const form = document.getElementById('chatForm');
  const input = document.getElementById('chatInput');
  const quickWrap = document.getElementById('chatQuick');

  fab.addEventListener('click', () => {
    panel.classList.toggle('open');
    if (panel.classList.contains('open')) input.focus();
  });
  closeBtn.addEventListener('click', () => panel.classList.remove('open'));

  function addBubble(text, who) {
    const b = document.createElement('div');
    b.className = 'chat-bubble ' + who;
    b.textContent = text;
    body.appendChild(b);
    body.scrollTop = body.scrollHeight;
    return b;
  }

  function showTyping() {
    const t = document.createElement('div');
    t.className = 'chat-bubble bot typing';
    t.innerHTML = '<span></span><span></span><span></span>';
    body.appendChild(t);
    body.scrollTop = body.scrollHeight;
    return t;
  }

  // ══════════════════════════════════════════════════════════════
  // ĐIỂM TÍCH HỢP BACKEND THẬT
  // Thay hàm getDemoReply() bên dưới bằng lệnh gọi API thực tế, ví dụ:
  //
  //   async function getReply(userText) {
  //     const res = await fetch('https://api.coze.com/open_api/v2/chat', {
  //       method: 'POST',
  //       headers: {
  //         'Authorization': 'Bearer <API_KEY_CUA_BAN>',
  //         'Content-Type': 'application/json'
  //       },
  //       body: JSON.stringify({ bot_id: '<BOT_ID>', user: 'guest', query: userText, stream: false })
  //     });
  //     const data = await res.json();
  //     return data.messages.find(m => m.type === 'answer').content;
  //   }
  //
  // Sau đó gọi `await getReply(text)` thay cho `getDemoReply(text)` ở hàm sendMessage().
  // ══════════════════════════════════════════════════════════════
  function getDemoReply(text) {
    const q = text.toLowerCase();
    if (q.includes('giới thiệu') || q.includes('là ai') || q.includes('sinh viên')) {
      return 'Dạ thưa Thầy/Cô, em xin giới thiệu ngắn gọn về sinh viên Nguyễn Bảo Trung: bạn là sinh viên khoa Ngôn ngữ và Văn hóa Anh, Trường Đại học Ngoại ngữ – ĐHQGHN, MSSV 25041189. Portfolio được thực hiện cho học phần Nhập môn Công nghệ số và Trí tuệ nhân tạo, gồm 6 bài thực hành trong 6 tuần ạ.';
    }
    if (q.includes('điểm') || q.includes('chấm')) {
      return 'Dạ thưa Thầy/Cô, việc đánh giá và cho điểm là thẩm quyền của Thầy/Cô nên em xin phép không đưa ra nhận định này ạ. Em có thể hỗ trợ Thầy/Cô đối chiếu nhanh nội dung bài làm với các tiêu chí Thầy/Cô đang quan tâm ạ.';
    }
    if (q.includes('bài 1') || q.includes('thư mục') || q.includes('tệp')) {
      return 'Dạ thưa Thầy/Cô, Bài 1 thực hành 8 thao tác quản lý tệp/thư mục trên Windows: tạo, đổi tên, di chuyển (Cut & Paste), xoá, xoá vĩnh viễn và khôi phục từ Recycle Bin ạ.';
    }
    if (q.includes('bài 2') || q.includes('nguồn') || q.includes('hallyu')) {
      return 'Dạ thưa Thầy/Cô, Bài 2 là báo cáo nghiên cứu về Làn sóng Hàn Quốc (Hallyu), thu thập 12 tài liệu chất lượng cao (gồm 7 bài báo khoa học có bình duyệt), đánh giá theo 5 tiêu chí: Tác giả, Cơ quan xuất bản, Phương pháp nghiên cứu, Chỉ số trích dẫn và Tính cập nhật ạ.';
    }
    if (q.includes('bài 3') || q.includes('prompt')) {
      return 'Dạ thưa Thầy/Cô, Bài 3 thực hành Prompt Engineering qua 3 tác vụ (tóm tắt tài liệu, giải thích khái niệm, tạo câu hỏi ôn tập), mỗi tác vụ thử ở 3 cấp độ prompt: cơ bản, cải tiến và nâng cao ạ.';
    }
    if (q.includes('bài 4') || q.includes('nhóm') || q.includes('trello')) {
      return 'Dạ thưa Thầy/Cô, Bài 4 là báo cáo cá nhân về điều phối dự án nhóm "Ứng dụng AI trong bán hàng online", sử dụng Trello, Google Docs, Drive và Meet, cùng 2 thách thức thực tế đã gặp và cách xử lý ạ.';
    }
    if (q.includes('bài 5') || q.includes('infographic') || q.includes('canva')) {
      return 'Dạ thưa Thầy/Cô, Bài 5 kết hợp ChatGPT, Microsoft Designer và Canva AI để xây dựng infographic "Ứng dụng AI trong học tập của sinh viên", với khoảng 40% nội dung do AI hỗ trợ và hơn 60% là chỉnh sửa của sinh viên ạ.';
    }
    if (q.includes('bài 6') || q.includes('liêm chính') || q.includes('trách nhiệm')) {
      return 'Dạ thưa Thầy/Cô, Bài 6 trình bày 7 nguyên tắc cá nhân khi sử dụng AI có trách nhiệm trong học thuật, dựa trên chính sách định hướng của ĐHQGHN ạ.';
    }
    return 'Dạ thưa Thầy/Cô, câu hỏi này nằm ngoài phạm vi nội dung 6 bài thực hành trong Portfolio nên em xin phép chưa thể hỗ trợ ạ. Thầy/Cô có thể hỏi em về Bài 1 đến Bài 6, hoặc phần Giới thiệu và Tổng kết ạ.';
  }

  async function sendMessage(text) {
    if (!text.trim()) return;
    addBubble(text, 'user');
    input.value = '';
    const typingEl = showTyping();
    await new Promise(r => setTimeout(r, 700 + Math.random() * 500));
    typingEl.remove();
    const reply = getDemoReply(text); // <-- thay bằng: await getReply(text)
    addBubble(reply, 'bot');
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    sendMessage(input.value);
  });

  quickWrap.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => sendMessage(btn.textContent));
  });
})();
</script>
